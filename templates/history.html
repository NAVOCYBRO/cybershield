<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan History - CyberShield</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0a0e17;
            --bg-card: #111827;
            --bg-input: #1f2937;
            --border: #374151;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent: #00d4ff;
            --accent-hover: #00b8e6;
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --warning: #f59e0b;
            --warning-bg: rgba(245, 158, 11, 0.1);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --info: #3b82f6;
            --info-bg: rgba(59, 130, 246, 0.1);
            --critical: #dc2626;
            --high: #f97316;
            --medium: #eab308;
            --low: #22c55e;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        nav {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            gap: 1rem;
            list-style: none;
        }
        
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary);
            background: var(--bg-input);
        }
        
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .header h1 {
            font-size: 1.75rem;
            font-weight: 600;
        }
        
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .filter-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .scan-table {
            width: 100%;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        .scan-table th, .scan-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        .scan-table th {
            background: var(--bg-input);
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .scan-table tr:last-child td {
            border-bottom: none;
        }
        
        .scan-table tr:hover td {
            background: var(--bg-input);
        }
        
        .target-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        
        .target-link:hover {
            text-decoration: underline;
        }
        
        .risk-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .risk-badge.critical {
            background: var(--danger-bg);
            color: var(--danger);
        }
        
        .risk-badge.high {
            background: rgba(249, 115, 22, 0.1);
            color: var(--high);
        }
        
        .risk-badge.medium {
            background: rgba(234, 179, 8, 0.1);
            color: var(--medium);
        }
        
        .risk-badge.low {
            background: var(--success-bg);
            color: var(--low);
        }
        
        .risk-badge.info {
            background: var(--info-bg);
            color: var(--info);
        }
        
        .vuln-count {
            display: flex;
            gap: 0.5rem;
        }
        
        .vuln-count span {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .vuln-count .critical { background: var(--danger-bg); color: var(--danger); }
        .vuln-count .high { background: rgba(249, 115, 22, 0.1); color: var(--high); }
        .vuln-count .medium { background: rgba(234, 179, 8, 0.1); color: var(--medium); }
        .vuln-count .low { background: var(--success-bg); color: var(--low); }
        
        .actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn-icon {
            padding: 0.5rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-icon:hover {
            color: var(--accent);
            border-color: var(--accent);
        }
        
        .btn-icon.delete:hover {
            color: var(--danger);
            border-color: var(--danger);
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }
        
        .pagination button {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
        }
        
        .pagination button:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .scan-detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .scan-detail-modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-card);
            border-radius: 12px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        
        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-body {
            padding: 1.5rem;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .detail-item {
            background: var(--bg-input);
            padding: 1rem;
            border-radius: 8px;
        }
        
        .detail-item label {
            display: block;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }
        
        .detail-item span {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .detail-section {
            margin-top: 1.5rem;
        }
        
        .detail-section h3 {
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        
        .vuln-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .vuln-item {
            background: var(--bg-input);
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .header { flex-direction: column; gap: 1rem; align-items: flex-start; }
            .scan-table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-content">
            <a href="/" class="nav-brand">
                <i class="fas fa-shield-halved"></i>
                CyberShield
            </a>
            <ul class="nav-links">
                <li><a href="/"><i class="fas fa-search"></i> Scanner</a></li>
                <li><a href="/history" class="active"><i class="fas fa-history"></i> History</a></li>
                <li><a href="/analytics"><i class="fas fa-chart-line"></i> Analytics</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-history"></i> Scan History</h1>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-range="all">All Time</button>
            <button class="filter-btn" data-range="24h">Last 24h</button>
            <button class="filter-btn" data-range="7d">Last 7 Days</button>
            <button class="filter-btn" data-range="30d">Last 30 Days</button>
        </div>

        <div id="scanList">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading scan history...</p>
            </div>
        </div>
    </div>

    <div class="scan-detail-modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Scan Details</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>

    <script>
        let currentOffset = 0;
        let currentRange = 'all';
        const limit = 20;
        
        async function loadHistory() {
            const container = document.getElementById('scanList');
            container.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>';
            
            try {
                const params = new URLSearchParams({ limit, offset: currentOffset });
                if (currentRange !== 'all') params.append('range', currentRange);
                
                const res = await fetch(`/api/history?${params}`);
                const data = await res.json();
                
                if (!data.scans || data.scans.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-folder-open"></i>
                            <p>No scans found</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = `
                    <table class="scan-table">
                        <thead>
                            <tr>
                                <th>Target</th>
                                <th>Risk Level</th>
                                <th>Score</th>
                                <th>Vulnerabilities</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.scans.map(scan => `
                                <tr>
                                    <td><a href="#" class="target-link" onclick="viewScan('${scan.scan_id}')">${scan.target}</a></td>
                                    <td><span class="risk-badge ${scan.risk_level.toLowerCase()}">${scan.risk_level}</span></td>
                                    <td>${scan.risk_score}</td>
                                    <td>
                                        <div class="vuln-count">
                                            ${scan.critical_count ? `<span class="critical">${scan.critical_count}C</span>` : ''}
                                            ${scan.high_count ? `<span class="high">${scan.high_count}H</span>` : ''}
                                            ${scan.medium_count ? `<span class="medium">${scan.medium_count}M</span>` : ''}
                                            ${scan.low_count ? `<span class="low">${scan.low_count}L</span>` : ''}
                                        </div>
                                    </td>
                                    <td>${formatDate(scan.created_at)}</td>
                                    <td>
                                        <div class="actions">
                                            <button class="btn-icon" onclick="viewScan('${scan.scan_id}')" title="View"><i class="fas fa-eye"></i></button>
                                            <button class="btn-icon" onclick="deleteScan('${scan.scan_id}')" title="Delete" class="delete"><i class="fas fa-trash"></i></button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                
            } catch (err) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Failed to load history</p></div>';
            }
        }
        
        async function viewScan(scanId) {
            const modal = document.getElementById('detailModal');
            const body = document.getElementById('modalBody');
            const title = document.getElementById('modalTitle');
            
            modal.classList.add('active');
            body.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i></div>';
            
            try {
                const res = await fetch(`/api/history/${scanId}`);
                const data = await res.json();
                
                if (!data.scan) return;
                
                const s = data.scan;
                title.textContent = `Scan: ${s.target}`;
                
                body.innerHTML = `
                    <div class="detail-grid">
                        <div class="detail-item">
                            <label>Risk Level</label>
                            <span class="risk-badge ${s.risk_level.toLowerCase()}">${s.risk_level}</span>
                        </div>
                        <div class="detail-item">
                            <label>Risk Score</label>
                            <span>${s.risk_score}</span>
                        </div>
                        <div class="detail-item">
                            <label>Total Vulnerabilities</label>
                            <span>${s.total_vulns}</span>
                        </div>
                        <div class="detail-item">
                            <label>Scan Duration</label>
                            <span>${s.scan_duration.toFixed(1)}s</span>
                        </div>
                    </div>
                    
                    ${s.vulnerabilities && s.vulnerabilities.length > 0 ? `
                        <div class="detail-section">
                            <h3><i class="fas fa-bug"></i> Vulnerabilities (${s.vulnerabilities.length})</h3>
                            <div class="vuln-list">
                                ${s.vulnerabilities.map(v => `
                                    <div class="vuln-item">
                                        <div>
                                            <strong>${v.name || v.vuln_type}</strong>
                                            <span class="risk-badge ${v.severity}">${v.severity}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                    
                    ${s.leaks && s.leaks.length > 0 ? `
                        <div class="detail-section">
                            <h3><i class="fas fa-key"></i> Leaks Detected (${s.leaks.length})</h3>
                            <div class="vuln-list">
                                ${s.leaks.map(l => `
                                    <div class="vuln-item">
                                        <div>
                                            <strong>${l.name}</strong>
                                            <span style="color: var(--text-muted)">${l.leak_type}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                `;
                
            } catch (err) {
                body.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Failed to load scan details</p></div>';
            }
        }
        
        async function deleteScan(scanId) {
            if (!confirm('Delete this scan from history?')) return;
            
            try {
                await fetch(`/api/history/${scanId}`, { method: 'DELETE' });
                loadHistory();
            } catch (err) {
                alert('Failed to delete scan');
            }
        }
        
        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }
        
        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRange = btn.dataset.range;
                currentOffset = 0;
                loadHistory();
            });
        });
        
        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') closeModal();
        });
        
        loadHistory();
    </script>
</body>
</html>
